name: Qilin game framework

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '0UsefulExamples/qilin-game-framework/**'
      - '.github/workflows/qilin-game-framework.yml'
      - '!0UsefulExamples/qilin-game-framework/reference/qilin.p8'
  pull_request:
    branches: [main]
    paths:
      - '0UsefulExamples/qilin-game-framework/**'
      - '.github/workflows/qilin-game-framework.yml'

permissions:
  contents: write

concurrency:
  group: qilin-game-framework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-sync-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply staged framework payload
        if: ${{ hashFiles('0UsefulExamples/qilin-game-framework/bootstrap/apply_payload.py') != '' }}
        run: python 0UsefulExamples/qilin-game-framework/bootstrap/apply_payload.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install preview dependencies
        working-directory: 0UsefulExamples/qilin-game-framework
        run: python -m pip install -r requirements.txt

      - name: Validate framework
        working-directory: 0UsefulExamples/qilin-game-framework
        run: python -m unittest discover -s tests -v

      - name: Commit staged update to the current branch
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            https://raw.githubusercontent.com/wslu42/qilin/main/qilin.p8 \
            -o 0UsefulExamples/qilin-game-framework/reference/qilin.p8

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo 'Framework and reference are already current.'
            exit 0
          fi

          git commit -m 'Promote controller schema and remove legacy wrapper [skip ci]'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
