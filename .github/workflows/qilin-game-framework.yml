name: Qilin game framework

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '0UsefulExamples/qilin-game-framework/**'
      - '.github/workflows/qilin-game-framework.yml'
      - '!0UsefulExamples/qilin-game-framework/reference/qilin.p8'

permissions:
  contents: write

jobs:
  sync-original-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Fetch original Qilin cartridge
        run: |
          mkdir -p 0UsefulExamples/qilin-game-framework/reference
          curl -fsSL \
            https://raw.githubusercontent.com/wslu42/qilin/main/qilin.p8 \
            -o 0UsefulExamples/qilin-game-framework/reference/qilin.p8
      - name: Commit reference if changed
        run: |
          if git diff --quiet -- 0UsefulExamples/qilin-game-framework/reference/qilin.p8; then
            echo 'Original Qilin reference already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 0UsefulExamples/qilin-game-framework/reference/qilin.p8
          git commit -m 'Sync original Qilin reference [skip ci]'
          git push

  validate-framework:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 0UsefulExamples/qilin-game-framework
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
